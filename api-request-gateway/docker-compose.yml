services:
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      gateway_a:
        condition: service_healthy
      gateway_b:
        condition: service_healthy
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - api_request_net

  gateway_a:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: >
      uvicorn gateway.main:app --host 0.0.0.0 --port 8000 --workers 1
    environment:
      LOG_LEVEL: INFO
      ENVIRONMENT: docker
      APP_VERSION: "1.0.0"
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+asyncpg://ai_mentor:ai_mentor@postgres:5432/ai_mentor
      RATE_LIMIT_PER_HOUR: "10000"
      DOCS_ENABLED: "true"
      CORS_ORIGINS: "*"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 50s
    networks:
      - api_request_net

  gateway_b:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: >
      uvicorn gateway.main:app --host 0.0.0.0 --port 8000 --workers 1
    environment:
      LOG_LEVEL: INFO
      ENVIRONMENT: docker
      APP_VERSION: "1.0.0"
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+asyncpg://ai_mentor:ai_mentor@postgres:5432/ai_mentor
      RATE_LIMIT_PER_HOUR: "10000"
      DOCS_ENABLED: "true"
      CORS_ORIGINS: "*"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 50s
    networks:
      - api_request_net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - api_request_net

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ai_mentor
      POSTGRES_PASSWORD: ai_mentor
      POSTGRES_DB: ai_mentor
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/migrations/001_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_mentor -d ai_mentor"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - api_request_net

  worker_analyze:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["python", "-m", "workers.analyze_worker"]
    environment:
      LOG_LEVEL: INFO
      ENVIRONMENT: docker
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+asyncpg://ai_mentor:ai_mentor@postgres:5432/ai_mentor
      CODE_ANALYZE_MODEL_ID: Vilyam888/Code_analyze.1.0
      LOAD_IN_4BIT: "true"
      STREAM_GROUP_ANALYZE: analyze_workers
      CONSUMER_NAME: analyze-1
      MAX_NEW_TOKENS: "1024"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    gpus: all
    networks:
      - api_request_net

  worker_generate:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["python", "-m", "workers.generate_worker"]
    environment:
      LOG_LEVEL: INFO
      ENVIRONMENT: docker
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+asyncpg://ai_mentor:ai_mentor@postgres:5432/ai_mentor
      BROKEN_CODE_MODEL_ID: Vilyam888/Broken_Code_Generation.1.0
      LOAD_IN_4BIT: "true"
      STREAM_GROUP_GENERATE: generate_workers
      CONSUMER_NAME: generate-1
      MAX_NEW_TOKENS: "1536"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    gpus: all
    networks:
      - api_request_net

  worker_pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["python", "-m", "workers.pipeline_worker"]
    environment:
      LOG_LEVEL: INFO
      ENVIRONMENT: docker
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+asyncpg://ai_mentor:ai_mentor@postgres:5432/ai_mentor
      CODE_ANALYZE_MODEL_ID: Vilyam888/Code_analyze.1.0
      BROKEN_CODE_MODEL_ID: Vilyam888/Broken_Code_Generation.1.0
      LOAD_IN_4BIT: "true"
      STREAM_GROUP_PIPELINE: pipeline_workers
      CONSUMER_NAME: pipeline-1
      MAX_NEW_TOKENS: "1536"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    gpus: all
    networks:
      - api_request_net

networks:
  api_request_net:
    driver: bridge

volumes:
  pg_data: {}
  redis_data: {}
