upstream code_analyze_svc {
    least_conn;
    server code-analyze:8000;
    keepalive 32;
}

upstream task_generate_svc {
    least_conn;
    server task-generate:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;
    server_tokens off;
    client_max_body_size 32m;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header X-ML-Balancer "1" always;

    gzip on;
    gzip_min_length 256;
    gzip_types application/json text/plain text/csv application/javascript;

    include /etc/nginx/conf.d/ml-common-locations.inc;
}

server {
    listen 443 ssl;
    http2 on;
    server_name _;
    server_tokens off;
    client_max_body_size 32m;

    ssl_certificate /etc/nginx/tls/server/tls.crt;
    ssl_certificate_key /etc/nginx/tls/server/tls.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_client_certificate /etc/nginx/tls/gateway-client-ca/ca.crt;
    ssl_verify_client optional;
    ssl_verify_depth 2;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header X-ML-Balancer "1" always;

    gzip on;
    gzip_min_length 256;
    gzip_types application/json text/plain text/csv application/javascript;

    include /etc/nginx/conf.d/ml-common-locations.inc;
}
