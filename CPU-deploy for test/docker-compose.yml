services:
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      gateway_a:
        condition: service_healthy
      gateway_b:
        condition: service_healthy
    ports:
      - "8080:80"
    volumes:
      - ../api-request-gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - cpu_test_net

  gateway_a:
    build:
      context: ../api-request-gateway
      dockerfile: Dockerfile
    restart: unless-stopped
    command: >
      uvicorn gateway.main:app --host 0.0.0.0 --port 8000 --workers 1
    environment:
      LOG_LEVEL: INFO
      ENVIRONMENT: cpu-test
      APP_VERSION: "1.0.0"
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+asyncpg://ai_mentor:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/ai_mentor
      RATE_LIMIT_PER_HOUR: "10000"
      DOCS_ENABLED: "true"
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      WEBHOOK_ALLOWED_HOSTS: ${WEBHOOK_ALLOWED_HOSTS:-}
      WEBHOOK_SIGNING_SECRET: ${WEBHOOK_SIGNING_SECRET:?set WEBHOOK_SIGNING_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 50s
    networks:
      - cpu_test_net

  gateway_b:
    build:
      context: ../api-request-gateway
      dockerfile: Dockerfile
    restart: unless-stopped
    command: >
      uvicorn gateway.main:app --host 0.0.0.0 --port 8000 --workers 1
    environment:
      LOG_LEVEL: INFO
      ENVIRONMENT: cpu-test
      APP_VERSION: "1.0.0"
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+asyncpg://ai_mentor:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/ai_mentor
      RATE_LIMIT_PER_HOUR: "10000"
      DOCS_ENABLED: "true"
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      WEBHOOK_ALLOWED_HOSTS: ${WEBHOOK_ALLOWED_HOSTS:-}
      WEBHOOK_SIGNING_SECRET: ${WEBHOOK_SIGNING_SECRET:?set WEBHOOK_SIGNING_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 50s
    networks:
      - cpu_test_net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - cpu_test_net

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ai_mentor
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ai_mentor
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ../api-request-gateway/db/migrations/001_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_mentor -d ai_mentor"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - cpu_test_net

  mock_workers:
    build:
      context: ../api-request-gateway
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["python", "/cpu-test/mock_workers.py"]
    environment:
      LOG_LEVEL: INFO
      ENVIRONMENT: cpu-test
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+asyncpg://ai_mentor:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/ai_mentor
      STREAM_BATCH: "4"
    volumes:
      - ./mock_workers.py:/cpu-test/mock_workers.py:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cpu_test_net

  webhook_dispatcher:
    build:
      context: ../api-request-gateway
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["python", "-m", "workers.webhook_dispatcher"]
    environment:
      LOG_LEVEL: INFO
      ENVIRONMENT: cpu-test
      REDIS_URL: redis://redis:6379/0
      STREAM_GROUP_WEBHOOK: webhook_dispatchers
      WEBHOOK_ALLOWED_HOSTS: ${WEBHOOK_ALLOWED_HOSTS:-}
      WEBHOOK_SIGNING_SECRET: ${WEBHOOK_SIGNING_SECRET:?set WEBHOOK_SIGNING_SECRET}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - cpu_test_net

networks:
  cpu_test_net:
    driver: bridge

volumes:
  pg_data: {}
  redis_data: {}
