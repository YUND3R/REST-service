name: CI

on:
  push:
    branches: [main, master]
    paths:
      - "api-request-gateway/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "api-request-gateway/**"
      - ".github/workflows/ci.yml"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    working-directory: api-request-gateway

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.3"
          enable-cache: true

      - name: Sync (dev + lockfile)
        run: uv sync --locked --all-groups

      - name: Ruff
        run: uv run ruff check gateway workers models db tests

      - name: Unit tests
        run: uv run pytest -q --tb=short

      - name: Byte-compile
        run: uv run python -m compileall -q gateway workers models db tests

  docker-build:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (verify Dockerfile)
        uses: docker/build-push-action@v6
        with:
          context: api-request-gateway
          file: api-request-gateway/Dockerfile
          push: false
          tags: api-request-gateway:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
