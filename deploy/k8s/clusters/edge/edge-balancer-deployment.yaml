apiVersion: apps/v1
kind: Deployment
metadata:
  name: edge-balancer
  labels:
    app: edge-balancer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: edge-balancer
  template:
    metadata:
      labels:
        app: edge-balancer
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 15
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: "500m"
      volumes:
        - name: conf
          configMap:
            name: edge-balancer-nginx-conf
