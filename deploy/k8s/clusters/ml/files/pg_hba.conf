# Local socket is used by container-local readiness checks.
local all all trust

# Require TLS and a valid client certificate signed by postgres-tls ca.crt.
hostssl all all 0.0.0.0/0 cert clientcert=verify-full
hostssl all all ::/0 cert clientcert=verify-full

# Reject any non-TLS network connection.
hostnossl all all 0.0.0.0/0 reject
hostnossl all all ::/0 reject
