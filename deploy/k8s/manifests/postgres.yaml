apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      securityContext:
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: prepare-tls
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              cp /tls-src/tls.crt /tls/server.crt
              cp /tls-src/tls.key /tls/server.key
              chown 999:999 /tls/server.crt /tls/server.key
              chmod 600 /tls/server.key
              chmod 644 /tls/server.crt
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsUser: 0
          volumeMounts:
            - name: postgres-tls-src
              mountPath: /tls-src
              readOnly: true
            - name: postgres-tls
              mountPath: /tls
      containers:
        - name: postgres
          image: postgres:16-alpine
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsUser: 999
          env:
            - name: POSTGRES_USER
              value: ai_mentor
            - name: POSTGRES_DB
              value: ai_mentor
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secrets
                  key: password
          args:
            - -c
            - ssl=on
            - -c
            - ssl_cert_file=/tls/server.crt
            - -c
            - ssl_key_file=/tls/server.key
          ports:
            - name: postgres
              containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: schema
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
            - name: postgres-tls
              mountPath: /tls
              readOnly: true
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - ai_mentor
                - -d
                - ai_mentor
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: 512Mi
              cpu: 250m
            limits:
              memory: 2Gi
              cpu: "1"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-data
        - name: schema
          configMap:
            name: postgres-schema
        - name: postgres-tls-src
          secret:
            secretName: postgres-tls
        - name: postgres-tls
          emptyDir: {}
