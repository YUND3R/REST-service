apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: api
          image: api-request-gateway:latest
          imagePullPolicy: IfNotPresent
          command:
            - uvicorn
            - gateway.main:app
            - --host
            - 0.0.0.0
            - --port
            - "8000"
            - --workers
            - "2"
          env:
            - name: ENVIRONMENT
              value: production
            - name: LOG_LEVEL
              value: INFO
            - name: REDIS_URL
              value: redis://redis:6379/0
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: gateway-secrets
                  key: database-url
            - name: RATE_LIMIT_PER_HOUR
              value: "1000"
            - name: DOCS_ENABLED
              value: "false"
            - name: CORS_ORIGINS
              value: https://app.example.com
            - name: WEBHOOK_ALLOWED_HOSTS
              value: webhooks.example.com
          ports:
            - name: http
              containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          resources:
            requests:
              memory: 512Mi
              cpu: 250m
            limits:
              memory: 1Gi
              cpu: "2"
