apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: api
          image: api-request-gateway:latest
          imagePullPolicy: IfNotPresent
          command:
            - uvicorn
            - gateway.main:app
            - --host
            - 0.0.0.0
            - --port
            - "8000"
            - --workers
            - "2"
          env:
            - name: ENVIRONMENT
              value: production
            - name: LOG_LEVEL
              value: INFO
            - name: REDIS_URL
              value: "rediss://redis:6379/0?ssl_cert_reqs=required&ssl_ca_certs=/etc/edu-ml/redis-tls/ca.crt&ssl_certfile=/etc/edu-ml/redis-client-tls/tls.crt&ssl_keyfile=/etc/edu-ml/redis-client-tls/tls.key"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: gateway-secrets
                  key: database-url
            - name: POSTGRES_SSL_CA_FILE
              value: /etc/edu-ml/postgres-client-tls/ca.crt
            - name: POSTGRES_SSL_CERT_FILE
              value: /etc/edu-ml/postgres-client-tls/tls.crt
            - name: POSTGRES_SSL_KEY_FILE
              value: /etc/edu-ml/postgres-client-tls/tls.key
            - name: RATE_LIMIT_PER_HOUR
              value: "1000"
            - name: DOCS_ENABLED
              value: "false"
            - name: CORS_ORIGINS
              value: https://app.example.com
            - name: WEBHOOK_ALLOWED_HOSTS
              value: webhooks.example.com
          ports:
            - name: http
              containerPort: 8000
          volumeMounts:
            - name: redis-tls
              mountPath: /etc/edu-ml/redis-tls
              readOnly: true
            - name: redis-client-tls
              mountPath: /etc/edu-ml/redis-client-tls
              readOnly: true
            - name: postgres-client-tls
              mountPath: /etc/edu-ml/postgres-client-tls
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          resources:
            requests:
              memory: 512Mi
              cpu: 250m
            limits:
              memory: 1Gi
              cpu: "2"
      volumes:
        - name: redis-tls
          secret:
            secretName: redis-tls
        - name: redis-client-tls
          secret:
            secretName: redis-client-tls
        - name: postgres-client-tls
          secret:
            secretName: postgres-client-tls
