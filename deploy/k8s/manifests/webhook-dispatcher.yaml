apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhook-dispatcher
spec:
  replicas: 2
  selector:
    matchLabels:
      app: webhook-dispatcher
  template:
    metadata:
      labels:
        app: webhook-dispatcher
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: dispatcher
          image: api-request-gateway:latest
          imagePullPolicy: IfNotPresent
          command:
            - python
            - -m
            - workers.webhook_dispatcher
          env:
            - name: ENVIRONMENT
              value: production
            - name: LOG_LEVEL
              value: INFO
            - name: REDIS_URL
              value: "rediss://redis:6379/0?ssl_cert_reqs=required&ssl_ca_certs=/etc/edu-ml/redis-tls/ca.crt&ssl_certfile=/etc/edu-ml/redis-client-tls/tls.crt&ssl_keyfile=/etc/edu-ml/redis-client-tls/tls.key"
            - name: STREAM_GROUP_WEBHOOK
              value: webhook_dispatchers
            - name: WEBHOOK_ALLOWED_HOSTS
              value: webhooks.example.com
            - name: WEBHOOK_SIGNING_SECRET
              valueFrom:
                secretKeyRef:
                  name: gateway-secrets
                  key: webhook-signing-secret
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsUser: 10001
          volumeMounts:
            - name: redis-tls
              mountPath: /etc/edu-ml/redis-tls
              readOnly: true
            - name: redis-client-tls
              mountPath: /etc/edu-ml/redis-client-tls
              readOnly: true
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: "1"
      volumes:
        - name: redis-tls
          secret:
            secretName: redis-tls
        - name: redis-client-tls
          secret:
            secretName: redis-client-tls
