apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-generate
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker-generate
  template:
    metadata:
      labels:
        app: worker-generate
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: worker
          image: api-request-gateway:latest
          imagePullPolicy: IfNotPresent
          command:
            - python
            - -m
            - workers.generate_worker
          env:
            - name: ENVIRONMENT
              value: production
            - name: LOG_LEVEL
              value: INFO
            - name: REDIS_URL
              value: "rediss://redis:6379/0?ssl_cert_reqs=required&ssl_ca_certs=/etc/edu-ml/redis-tls/ca.crt"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: gateway-secrets
                  key: database-url
            - name: BROKEN_CODE_MODEL_ID
              value: Vilyam888/Broken_Code_Generation.1.0
            - name: LOAD_IN_4BIT
              value: "true"
            - name: STREAM_GROUP_GENERATE
              value: generate_workers
            - name: MAX_NEW_TOKENS
              value: "1536"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsUser: 10001
          volumeMounts:
            - name: redis-tls
              mountPath: /etc/edu-ml/redis-tls
              readOnly: true
          resources:
            requests:
              cpu: "2"
              memory: 8Gi
              nvidia.com/gpu: "1"
            limits:
              nvidia.com/gpu: "1"
      volumes:
        - name: redis-tls
          secret:
            secretName: redis-tls
