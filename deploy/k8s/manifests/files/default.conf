limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

upstream ml_balancer_svc {
    server ml-balancer:80;
    keepalive 32;
}

upstream auth_svc {
    server auth-service:8000;
    keepalive 16;
}

server {
    listen 80;
    server_name _;
    server_tokens off;
    client_max_body_size 32m;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    gzip on;
    gzip_min_length 256;
    gzip_types application/json text/plain text/csv application/javascript;

    location /auth/ {
        limit_req zone=api_limit burst=100 nodelay;
        proxy_pass http://auth_svc;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }

    location /v1/queue/analyze {
        limit_req zone=api_limit burst=50 nodelay;
        proxy_pass http://ml_balancer_svc;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
    }

    location /v1/queue/generate-task {
        limit_req zone=api_limit burst=50 nodelay;
        proxy_pass http://ml_balancer_svc;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
    }

    location /v1/analyze {
        limit_req zone=api_limit burst=50 nodelay;
        proxy_pass http://ml_balancer_svc;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location /v1/generate-task {
        limit_req zone=api_limit burst=50 nodelay;
        proxy_pass http://ml_balancer_svc;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location /v1/generate-from-progress {
        limit_req zone=api_limit burst=50 nodelay;
        proxy_pass http://ml_balancer_svc;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location = /v1/user/progress {
        limit_req zone=api_limit burst=100 nodelay;
        proxy_pass http://ml_balancer_svc;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }

    location = /v1/user/profile {
        limit_req zone=api_limit burst=100 nodelay;
        proxy_pass http://ml_balancer_svc;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }

    location /v1/user/last-analyze {
        limit_req zone=api_limit burst=100 nodelay;
        proxy_pass http://ml_balancer_svc;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }

    location /v1/user/analyze-history {
        limit_req zone=api_limit burst=100 nodelay;
        proxy_pass http://ml_balancer_svc;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }

    location /v1/user/last-task {
        limit_req zone=api_limit burst=100 nodelay;
        proxy_pass http://ml_balancer_svc;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }

    location /v1/user/task-history {
        limit_req zone=api_limit burst=100 nodelay;
        proxy_pass http://ml_balancer_svc;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }

    location = /health {
        default_type application/json;
        return 200 '{"status":"ok","service":"api-gateway"}';
    }

    location / {
        default_type text/plain;
        return 200 'gateway';
    }
}
