apiVersion: v1
kind: Service
metadata:
  name: redis-analyze
spec:
  selector:
    app: redis-analyze
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-analyze
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-analyze
  template:
    metadata:
      labels:
        app: redis-analyze
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args:
            - redis-server
            - --appendonly
            - "yes"
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 1Gi
      volumes:
        - name: data
          emptyDir: {}
