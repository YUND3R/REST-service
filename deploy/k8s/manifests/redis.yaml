apiVersion: v1
kind: Service
metadata:
  name: redis
spec:
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      securityContext:
        fsGroup: 999
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redis
          image: redis:7-alpine
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsUser: 999
          args:
            - redis-server
            - --port
            - "0"
            - --tls-port
            - "6379"
            - --tls-cert-file
            - /tls/tls.crt
            - --tls-key-file
            - /tls/tls.key
            - --tls-ca-cert-file
            - /tls/ca.crt
            - --tls-auth-clients
            - "yes"
            - --appendonly
            - "yes"
            - --maxmemory-policy
            - allkeys-lru
          ports:
            - name: redis
              containerPort: 6379
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tls
              mountPath: /tls
              readOnly: true
          resources:
            requests:
              memory: 512Mi
              cpu: 250m
            limits:
              memory: 2Gi
              cpu: "1"
      volumes:
        - name: data
          emptyDir: {}
        - name: tls
          secret:
            secretName: redis-tls
