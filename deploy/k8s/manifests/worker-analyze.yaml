apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-analyze
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker-analyze
  template:
    metadata:
      labels:
        app: worker-analyze
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: worker
          image: api-request-gateway:latest
          imagePullPolicy: IfNotPresent
          command:
            - python
            - -m
            - workers.analyze_worker
          env:
            - name: ENVIRONMENT
              value: production
            - name: LOG_LEVEL
              value: INFO
            - name: REDIS_URL
              value: "rediss://redis:6379/0?ssl_cert_reqs=required&ssl_ca_certs=/etc/edu-ml/redis-tls/ca.crt&ssl_certfile=/etc/edu-ml/redis-client-tls/tls.crt&ssl_keyfile=/etc/edu-ml/redis-client-tls/tls.key"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: gateway-secrets
                  key: database-url
            - name: POSTGRES_SSL_CA_FILE
              value: /etc/edu-ml/postgres-client-tls/ca.crt
            - name: POSTGRES_SSL_CERT_FILE
              value: /etc/edu-ml/postgres-client-tls/tls.crt
            - name: POSTGRES_SSL_KEY_FILE
              value: /etc/edu-ml/postgres-client-tls/tls.key
            - name: CODE_ANALYZE_MODEL_ID
              value: Vilyam888/Code_analyze.1.0
            - name: LOAD_IN_4BIT
              value: "true"
            - name: STREAM_GROUP_ANALYZE
              value: analyze_workers
            - name: MAX_NEW_TOKENS
              value: "1024"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsUser: 10001
          volumeMounts:
            - name: redis-tls
              mountPath: /etc/edu-ml/redis-tls
              readOnly: true
            - name: redis-client-tls
              mountPath: /etc/edu-ml/redis-client-tls
              readOnly: true
            - name: postgres-client-tls
              mountPath: /etc/edu-ml/postgres-client-tls
              readOnly: true
          resources:
            requests:
              cpu: "2"
              memory: 8Gi
              nvidia.com/gpu: "1"
            limits:
              nvidia.com/gpu: "1"
      volumes:
        - name: redis-tls
          secret:
            secretName: redis-tls
        - name: redis-client-tls
          secret:
            secretName: redis-client-tls
        - name: postgres-client-tls
          secret:
            secretName: postgres-client-tls
