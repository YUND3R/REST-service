apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: model-analyze
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
---
apiVersion: v1
kind: Service
metadata:
  name: code-analyze
spec:
  selector:
    app: code-analyze
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: code-analyze
spec:
  replicas: 1
  selector:
    matchLabels:
      app: code-analyze
  template:
    metadata:
      labels:
        app: code-analyze
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: edu-ml-code-analyze:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsUser: 10001
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: LOCAL_MODEL_PATH
              value: /opt/models
            - name: TRANSFORMERS_OFFLINE
              value: "1"
            - name: HF_HUB_OFFLINE
              value: "1"
            - name: REDIS_URL
              value: redis://redis-analyze:6379/0
            - name: CORS_ORIGINS
              value: https://app.example.com
            - name: AUTH_ENABLED
              value: "true"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: auth-secrets
                  key: jwt-secret
          volumeMounts:
            - name: model-data
              mountPath: /opt/models
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 300
            periodSeconds: 30
            timeoutSeconds: 15
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 120
            periodSeconds: 15
            timeoutSeconds: 10
          resources:
            limits:
              nvidia.com/gpu: "1"
            requests:
              nvidia.com/gpu: "1"
              memory: 8Gi
              cpu: "2"
      volumes:
        - name: model-data
          persistentVolumeClaim:
            claimName: model-analyze
